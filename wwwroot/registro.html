<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MindCare | Crear Cuenta</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet"
          href="css/registro.css?v=1">

</head>

<body>

    <div class="registro-container">

        <div class="registro-card">

            <!-- LOGO -->
            <div class="logo-circle">
                <i class="fa-solid fa-brain"></i>
            </div>

            <!-- TITULO -->
            <h1>Crear Cuenta</h1>

            <p class="subtitle">
                Únete a MindCare y comienza tu seguimiento emocional.
            </p>

            <!-- FORMULARIO -->

            <div class="form-group">
                <label>
                    <i class="fa-solid fa-user"></i>
                    Nombre completo
                </label>

                <input type="text"
                       id="nombre"
                       placeholder="Ingresa tu nombre">
            </div>

            <div class="form-group">
                <label>
                    <i class="fa-solid fa-envelope"></i>
                    Correo electrónico
                </label>

                <input type="email"
                       id="email"
                       placeholder="ejemplo@correo.com">
            </div>

            <div class="form-group">
                <label>
                    <i class="fa-solid fa-lock"></i>
                    Contraseña
                </label>

                <input type="password"
                       id="password"
                       placeholder="********">
            </div>

            <div class="form-group">
                <label>
                    <i class="fa-solid fa-phone"></i>
                    Teléfono
                </label>

                <input type="text"
                       id="telefono"
                       placeholder="Tu número">
            </div>

            <div class="form-group">
                <label>
                    <i class="fa-solid fa-location-dot"></i>
                    Zona
                </label>

                <input type="text"
                       id="zona"
                       placeholder="Ciudad / Zona">
            </div>

            <!-- TIPO -->
            <div class="rol-box">

                <i class="fa-solid fa-user-check"></i>
                Cuenta tipo Usuario

            </div>

            <!-- MENSAJE -->
            <p id="msg"></p>

            <!-- BOTON -->
            <button class="btn-register"
                    onclick="registrar()">

                <i class="fa-solid fa-user-plus"></i>
                Crear cuenta

            </button>

            <!-- LINK -->
            <a href="login.html"
               class="back-link">

                <i class="fa-solid fa-arrow-left"></i>
                Volver al login

            </a>

        </div>

    </div>

    <script src="js/registro.js"></script>
    <div id="toast"></div>

</body>
</html>
