<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MindCare | Recuperar contraseña</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet"
          href="css/recuperar.css?v=2">

</head>

<body>

    <div class="recover-wrap">

        <div class="recover-card">

            <div class="logo-circle">
                <i class="fa-solid fa-shield-heart"></i>
            </div>

            <h1>Recuperar contraseña</h1>

            <p class="subtitle">
                Restablece el acceso a tu cuenta MindCare.
            </p>

            <!-- PASO 1 -->
            <div id="paso1">

                <div class="form-group">
                    <label>
                        <i class="fa-solid fa-envelope"></i>
                        Correo electrónico
                    </label>

                    <input type="email"
                           id="email"
                           placeholder="ejemplo@correo.com">
                </div>

                <button onclick="enviarCodigo()"
                        class="btn-main">

                    <i class="fa-solid fa-paper-plane"></i>
                    Enviar código

                </button>

            </div>

            <!-- PASO 2 -->
            <div id="paso2" style="display:none;">

                <div class="form-group">
                    <label>
                        <i class="fa-solid fa-key"></i>
                        Código recibido
                    </label>

                    <input type="text"
                           id="codigo"
                           placeholder="123456">
                </div>

                <div class="form-group">
                    <label>
                        <i class="fa-solid fa-lock"></i>
                        Nueva contraseña
                    </label>

                    <input type="password"
                           id="password"
                           placeholder="********">
                </div>

                <button onclick="cambiarPassword()"
                        class="btn-main">

                    <i class="fa-solid fa-rotate"></i>
                    Actualizar contraseña

                </button>

            </div>

            <p id="mensaje"></p>

            <a href="login.html"
               class="back-link">

                <i class="fa-solid fa-arrow-left"></i>
                Volver al login

            </a>

        </div>

    </div>

    <script src="js/recuperar.js"></script>
    <div id="toast"></div>

</body>
</html>
