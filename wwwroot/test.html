<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MindCare | Evaluación PHQ-9</title>

    <!-- ICONOS -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet"
          href="css/test.css">
</head>

<body>

    <div class="test-container">

        <!-- CABECERA -->
        <div class="test-card">

            <div class="logo-circle">
                <i class="fa-solid fa-brain"></i>
            </div>

            <h1>Evaluación Emocional</h1>

            <p class="subtitle">
                Responde según cómo te has sentido en los últimos días.
            </p>

            <!-- PROGRESO -->
            <div class="progress-box">
                <div id="barra"
                     class="progress-fill"></div>
            </div>

            <p id="contador"
               class="contador">
                Pregunta 1 de 9
            </p>

            <!-- PREGUNTA -->
            <div class="question-box">

                <h2 id="pregunta">
                    Cargando pregunta...
                </h2>

                <div class="answers">

                    <button onclick="responder(0)">
                        Nunca
                    </button>

                    <button onclick="responder(1)">
                        Varios días
                    </button>

                    <button onclick="responder(2)">
                        Más de la mitad
                    </button>

                    <button onclick="responder(3)">
                        Casi todos los días
                    </button>

                </div>

            </div>

            <!-- MENSAJE -->
            <p id="mensaje"
               class="mensaje"></p>

            <!-- VOLVER -->
            <button class="volver"
                    onclick="volverDashboard()">

                <i class="fa-solid fa-arrow-left"></i>
                Volver

            </button>

        </div>

    </div>

    <!-- JS -->
    <script src="js/test.js"></script>
    <div id="toast"></div>


</body>
</html>
